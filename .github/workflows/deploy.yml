name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./PCShop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: PCShop/package-lock.json

      - run: npm ci

      - name: Build (base-href pour GitHub Pages)
        run: npx ng build --configuration production --base-href /Projet_Angular_PCSHOP/

      - name: Fallback SPA + .nojekyll
        run: |
          cp dist/pcshop/browser/index.csr.html dist/pcshop/browser/404.html
          touch dist/pcshop/browser/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: PCShop/dist/pcshop/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
